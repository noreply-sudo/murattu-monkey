        // --- DOM Elements ---
        const loginForm = document.getElementById('login-form');

        // Initialize Icons
        lucide.createIcons();

        // --- Google Sign-In Handler ---
// --- Google Sign-In Handler ---
function handleGoogleLogin(response) {
    try {
        // Decode the Google JWT token payload
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));

        const googleUser = JSON.parse(jsonPayload);
        const email = googleUser.email.toLowerCase();

        // Check for either the specific G-Suite email or the fallback Gmail
        if (email === 'physioallied@jminstitutions.com' || email === 'physioalliedjubilee@gmail.com') {
            
            // Try to find the user in the array
            let user = users.find(u => u.email === email);
            
            // If the email isn't in the array (like the jminstitutions one), create a valid user object dynamically
            if (!user) {
                user = { email: email, name: 'Faculty Admin', course: 'Faculty' };
            }
            
            errorMessage.classList.add('hidden');
            localStorage.setItem('currentUser', JSON.stringify(user));
            switchScreen('faculty-selection-screen', true);
        } else {
            errorMessage.textContent = "Unauthorized Account. Students must log in above.";
            errorMessage.classList.remove('hidden');
        }
    } catch (err) {
        console.error("Login Error:", err);
        errorMessage.textContent = "Google Sign-In failed. Please try again.";
        errorMessage.classList.remove('hidden');
    }
}

        // --- SPA Routing & State Management ---
        function switchScreen(screenId, pushHistory = true) {
            document.querySelectorAll('.app-screen').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('flex');
            });
            
            const target = document.getElementById(screenId);
            target.classList.remove('hidden');
            target.classList.add('flex');
            
            if (pushHistory) {
                history.pushState({ screen: screenId }, '', `#${screenId.replace('-screen', '')}`);
            }
            
            lucide.createIcons();
        }

        window.addEventListener('popstate', (e) => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!user) {
                switchScreen('login-screen', false);
                return;
            }

            if (e.state && e.state.screen) {
                if (e.state.screen === 'faculty-selection-screen' && user.course !== 'Faculty') {
                    switchScreen('dashboard-screen', false);
                } else {
                    switchScreen(e.state.screen, false);
                }
            } else {
                if (user.course === 'Faculty') {
                    switchScreen('faculty-selection-screen', false);
                } else {
                    switchScreen('dashboard-screen', false);
                }
            }
        });

        function initApp() {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (user) {
                if (user.course === 'Faculty') {
                    switchScreen('faculty-selection-screen', false);
                    history.replaceState({ screen: 'faculty-selection-screen' }, '', '#faculty');
                } else {
                    setupDashboard(user, user.course);
                    switchScreen('dashboard-screen', false);
                    history.replaceState({ screen: 'dashboard-screen' }, '', '#dashboard');
                }
            } else {
                switchScreen('login-screen', false);
                history.replaceState({ screen: 'login-screen' }, '', '#login');
            }
            setDate();
        }

        // --- Functions ---
        function loadDashboard(courseToLoad) {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            setupDashboard(user, courseToLoad);
            switchScreen('dashboard-screen', true);
        }

        function setupDashboard(user, courseType) {
            userFirstNameEl.textContent = user.name.split(' ')[0];
            
            if (user.course === 'Faculty') {
                userCourseNameEl.textContent = `Viewing: ${courseType === 'BPT' ? 'BPT Program' : 'Allied Health'}`;
                backToSelectionBtn.classList.remove('hidden'); 
                logoutBtn.classList.add('hidden'); 
            } else {
                userCourseNameEl.textContent = courseType === 'BPT' ? 'Bachelor of Physiotherapy (BPT)' : 'Allied Health Program';
                backToSelectionBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
            }
            
            renderSchedule(courseType);
        }

        function renderSchedule(course) {
            scheduleContainer.innerHTML = ''; 
            const activeSchedule = course === 'BPT' ? bptSchedule : alliedSchedule;
            
            activeSchedule.forEach(slot => {
                const html = `
                    <a href="${slot.meetUrl}" target="_blank" rel="noopener noreferrer" class="block bg-white rounded-2xl p-4 shadow-sm border border-slate-100 active:scale-[0.98] transition-transform hover:shadow-md hover:border-blue-100 group relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1.5 bg-blue-500 rounded-l-2xl"></div>
                        <div class="flex justify-between items-center pl-2">
                            <div class="flex-1">
                                <div class="flex items-center text-blue-600 text-xs font-bold mb-1.5 gap-1.5">
                                    <i data-lucide="clock" class="w-3.5 h-3.5"></i>
                                    ${slot.time}
                                </div>
                                <h3 class="text-slate-800 font-bold text-base leading-tight mb-1">${slot.subject}</h3>
                                <p class="text-slate-500 text-xs">${slot.instructor}</p>
                            </div>
                            <div class="flex items-center justify-center w-10 h-10 bg-blue-50 text-blue-600 rounded-full group-hover:bg-blue-600 group-hover:text-white transition-colors ml-3 shrink-0">
                                <i data-lucide="video" class="w-5 h-5"></i>
                            </div>
                        </div>
                    </a>
                `;
                scheduleContainer.insertAdjacentHTML('beforeend', html);
            });
            lucide.createIcons();
        }

        function setDate() {
            const today = new Date();
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            currentDateEl.textContent = today.toLocaleDateString('en-US', dateOptions);
        }

        function performLogout() {
            localStorage.removeItem('currentUser');
            switchScreen('login-screen', true);
            
            emailInput.value = '';
            passwordInput.value = '';
            passwordInput.setAttribute('type', 'password');
            eyeIcon.setAttribute('data-lucide', 'eye');
            lucide.createIcons();
        }

        // --- Event Listeners ---
        togglePasswordBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.setAttribute('data-lucide', type === 'text' ? 'eye-off' : 'eye');
            lucide.createIcons();
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            
            const email = emailInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            const user = users.find(u => u.email.trim().toLowerCase() === email && u.password === password);

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                
                if (user.course === 'Faculty') {
                    switchScreen('faculty-selection-screen', true);
                } else {
                    setupDashboard(user, user.course);
                    switchScreen('dashboard-screen', true);
                }
            } else {
                errorMessage.textContent = "Invalid email or password.";
                errorMessage.classList.remove('hidden');
            }
        });

        emailInput.addEventListener('input', () => errorMessage.classList.add('hidden'));
        passwordInput.addEventListener('input', () => errorMessage.classList.add('hidden'));

        logoutBtn.addEventListener('click', performLogout);
        facultyLogoutBtn.addEventListener('click', performLogout);
        
        backToSelectionBtn.addEventListener('click', () => {
            switchScreen('faculty-selection-screen', true);
        });

        // Run Init
        initApp();
